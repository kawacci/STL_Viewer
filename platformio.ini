[env:esp32-p4-evboard]
platform = https://github.com/pioarduino/platform-espressif32.git#54.03.21
board = esp32-p4-evboard
framework = arduino

lib_deps = 
    m5stack/M5Unified
    SD
    FS

monitor_speed = 115200
monitor_dtr = 1
monitor_rts = 1

build_flags = 
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_DFU_ON_BOOT=0
    -I./include